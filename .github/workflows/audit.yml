name: Bot Audit Command
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install google-api-python-client

      - name: Run Bot of Alliance
        id: hunt_step
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          VIDEO_ID: ${{ github.event.issue.title }}
        run: |
          python main.py > report.txt
          
      - name: Post Results to Issue
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body-file: 'report.txt'

      - name: Close Intelligence Report
        run: gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
